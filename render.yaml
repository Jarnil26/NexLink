services:
  # Backend API
  - type: web
    name: chat-api
    env: docker
    dockerContext: ChatPlatform
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: ConnectionStrings__MongoDb
        sync: false
      - key: ConnectionStrings__Redis
        fromService:
          name: chat-redis
          type: redis
          property: connectionString
      - key: Jwt__Key
        generateValue: true
      - key: Jwt__Issuer
        value: ChatPlatformApi
      - key: Jwt__Audience
        value: ChatPlatformClients
      - key: AllowedOrigins
        value: https://chat-frontend-kuj4.onrender.com

  # Frontend Web App
  - type: web
    name: chat-frontend
    env: docker
    dockerContext: frontend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: API_URL
        value: https://chat-api-582i.onrender.com

  # Redis Instance
  - type: redis
    name: chat-redis
    plan: free
    ipAllowList: []
